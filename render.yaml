services:
  - type: web
    name: smart-city-services
    env: node
    plan: free
    buildCommand: "npm --prefix frontend install && npm --prefix frontend run build && npm --prefix backend install"
    startCommand: "node backend/init_db.mjs && node backend/migrate_v2.mjs && node backend/migrate_v3.mjs && node backend/migrate_v4.mjs && node backend/migrate_v5.mjs && node backend/migrate_v6.mjs && node backend/migrate_v7.mjs && node backend/server.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: POSTGRES_URL
        fromDatabase:
          name: smart-city-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: smart-city-db
    databaseName: smart_city_services
    user: smartcityuser
    plan: free
